# Render Blueprint for the Hyperyzer backend + managed Postgres.
# Deploy: push to GitHub, then Render → New → Blueprint → pick this repo.
# Secret values (sync:false) are entered in the Render dashboard after creation.
services:
  - type: web
    name: hyperyzer-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /
    plan: starter   # 'free' also works; starter avoids cold-start sleeps
    envVars:
      - key: APP_ENV
        value: production
      - key: TRANSCRIPTION_PROVIDER
        value: openai          # cloud Whisper (no local faster-whisper in prod)
      - key: JWT_SECRET
        generateValue: true    # Render generates a strong secret (satisfies prod guard)
      - key: DATABASE_URL
        fromDatabase:
          name: hyperyzer-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false            # set in dashboard
      # --- Payments: Paddle (Merchant of Record, works in Kosovo). Set these in the dashboard. ---
      - key: PAYMENT_PROVIDER
        value: paddle
      - key: PADDLE_API_KEY
        sync: false            # from Paddle dashboard → Developer → Authentication
      - key: PADDLE_WEBHOOK_SECRET
        sync: false            # from Paddle dashboard → Developer → Notifications → signing secret
      # One price id per subscription plan (create recurring prices in Paddle dashboard):
      - key: PADDLE_PRICE_CREATOR
        sync: false            # Creator €14/mo
      - key: PADDLE_PRICE_PRO
        sync: false            # Pro €29/mo
      - key: PADDLE_PRICE_AGENCY
        sync: false            # Agency €79/mo
      # One price id per one-time credit pack:
      - key: PADDLE_PRICE_PACK_SMALL
        sync: false            # 50 credits / €9
      - key: PADDLE_PRICE_PACK_LARGE
        sync: false            # 200 credits / €29
      - key: FRONTEND_URL
        sync: false            # your Vercel/custom domain URL, e.g. https://hyperyzer.com

databases:
  - name: hyperyzer-db
    plan: free
